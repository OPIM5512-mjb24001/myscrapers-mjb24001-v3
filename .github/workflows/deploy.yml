name: Deploy Scraper (CF Gen2 + Cloud Scheduler)
run-name: "Scraper deploy by ${{ github.actor }} • ${{ github.ref_name }}"

on:
  push:
    branches: [ "main" ]
    paths:
      - 'cloud_function/scraper_cars/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ vars.PROJECT_ID }}
  REGION: ${{ vars.REGION }}
  FUNCTION_NAME: craigslist-scraper
  FUNCTION_DIR: cloud_function/scraper_cars
  ENTRY_POINT: entrypoint
  RUNTIME: python312
  BUCKET_NAME: ${{ vars.BUCKET_NAME }}
  RUNTIME_SA: ${{ vars.RUNTIME_SA }}
  DEPLOYER_SA: ${{ vars.DEPLOYER_SA }}
  WORKLOAD_IDENTITY_PROVIDER: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
  SCHEDULE_BODY: ${{ vars.SCHEDULE_BODY || '{"pages":1,"max":3}' }}
  CRON_EXPR: "0 * * * *"         # :00 every hour; America/New_York set below

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Auth (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Deploy Cloud Function (Gen2, HTTP, authenticated)
        run: |
          set -euo pipefail
          SA_ARGS=()
          if [[ -n "${RUNTIME_SA:-}" ]]; then
            gcloud iam service-accounts describe "${RUNTIME_SA}" >/dev/null 2>&1
            SA_ARGS=(--service-account="${RUNTIME_SA}")
          fi
          gcloud functions deploy "${FUNCTION_NAME}" \
            --gen2 \
            --region="${REGION}" \
            --runtime="${RUNTIME}" \
            --source="${FUNCTION_DIR}" \
            --entry-point="${ENTRY_POINT}" \
            --trigger-http \
            --no-allow-unauthenticated \
            "${SA_ARGS[@]}" \
            --set-env-vars="PROJECT_ID=${PROJECT_ID},BUCKET_NAME=${BUCKET_NAME}" \
            --memory=512Mi \
            --timeout=540s

      - name: Grant invoker to deployer & runtime SAs
        run: |
          gcloud functions add-invoker-policy-binding "${FUNCTION_NAME}" \
            --gen2 --region "${REGION}" \
            --member="serviceAccount:${DEPLOYER_SA}"
          gcloud functions add-invoker-policy-binding "${FUNCTION_NAME}" \
            --gen2 --region "${REGION}" \
            --member="serviceAccount:${RUNTIME_SA}"

      - name: Get Function URL
        id: cfurl
        run: |
          URL=$(gcloud functions describe "${FUNCTION_NAME}" --gen2 --region "${REGION}" --format='value(serviceConfig.uri)')
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

      - name: Ensure Scheduler API enabled
        run: |
          set -euo pipefail
          gcloud services list --enabled --filter="cloudscheduler.googleapis.com" --format="value(config.name)" | grep -q cloudscheduler.googleapis.com \
            || gcloud services enable cloudscheduler.googleapis.com

      # These two bindings are REQUIRED for Cloud Scheduler OIDC using RUNTIME_SA
      - name: Bootstrap IAM for Scheduler OIDC (runtime SA)
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${RUNTIME_SA:-}" ]]; then
            echo "::error::RUNTIME_SA is not set. Add repo variable RUNTIME_SA."
            exit 1
          fi

          PROJECT_NUMBER="$(gcloud projects describe "${PROJECT_ID}" --format='value(projectNumber)')"
          SCHED_AGENT="service-${PROJECT_NUMBER}@gcp-sa-cloudscheduler.iam.gserviceaccount.com"
          echo "Scheduler agent: ${SCHED_AGENT}"

          retry_add_binding () {
            local sa="$1"
            local member="$2"
            local role="$3"

            for i in 1 2 3 4 5; do
              if gcloud iam service-accounts add-iam-policy-binding "${sa}" \
                --member="${member}" \
                --role="${role}"; then
                return 0
              fi
              echo "Retry $i failed for ${member} -> ${role}; sleeping..."
              sleep $((i * 2))
            done

            echo "::error::Failed to add ${role} for ${member} on ${sa}"
            exit 1
          }

          retry_add_binding "${RUNTIME_SA}" \
            "serviceAccount:${SCHED_AGENT}" \
            "roles/iam.serviceAccountTokenCreator"

          retry_add_binding "${RUNTIME_SA}" \
            "serviceAccount:${DEPLOYER_SA}" \
            "roles/iam.serviceAccountUser"

      - name: Create/Update Cloud Scheduler job (:00 ET, uses runtime SA OIDC)
        shell: bash
        run: |
          set -euo pipefail
          JOB_NAME="${FUNCTION_NAME}-hourly"
          URL="${{ steps.cfurl.outputs.url }}"
          [[ -z "${URL}" ]] && { echo "Function URL empty"; exit 1; }

          if gcloud scheduler jobs describe "$JOB_NAME" --location="${REGION}" >/dev/null 2>&1; then
            gcloud scheduler jobs update http "$JOB_NAME" \
              --location="${REGION}" \
              --schedule="${CRON_EXPR}" \
              --time-zone="America/New_York" \
              --uri="${URL}" \
              --http-method=POST \
              --message-body='${{ env.SCHEDULE_BODY }}' \
              --oidc-service-account-email="${RUNTIME_SA}" \
              --oidc-token-audience="${URL}"
          else
            gcloud scheduler jobs create http "$JOB_NAME" \
              --location="${REGION}" \
              --schedule="${CRON_EXPR}" \
              --time-zone="America/New_York" \
              --uri="${URL}" \
              --http-method=POST \
              --message-body='${{ env.SCHEDULE_BODY }}' \
              --oidc-service-account-email="${RUNTIME_SA}" \
              --oidc-token-audience="${URL}"
          fi
