# Pulls the latest GCS training run from structured/model_runs/<YYYYMMDDHH>/
# and commits into repo subfolders only (never writes CSV/JSON to results/ root).
name: Sync model artifacts to repo
run-name: Sync model run artifacts for ${{ github.ref_name }} by @${{ github.actor }}
on:
  schedule:
    - cron: '45 * * * *' # Every hour at :45
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  PROJECT_ID: ${{ vars.PROJECT_ID }}
  BUCKET_NAME: ${{ vars.BUCKET_NAME }}
  WORKLOAD_IDENTITY_PROVIDER: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
  DEPLOYER_SA: ${{ vars.DEPLOYER_SA }}
  GCS_MODEL_RUNS_PREFIX: "structured/model_runs"
  GCS_METRICS_HISTORY: "structured/model_runs/metrics_history.csv"

jobs:
  sync_data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Auth (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
          version: ">= 390.0.0"

      - name: Download latest model run + cumulative history
        id: sync
        shell: bash
        run: |
          set -euo pipefail
          BASE="gs://${BUCKET_NAME}/${GCS_MODEL_RUNS_PREFIX}"
          # Latest lexicographic run id matches chronological YYYYMMDDHH
          LATEST_DIR=$(gsutil ls -d "${BASE}/"*/ 2>/dev/null | grep -E '/[0-9]{10}/$' | sort | tail -1 || true)
          if [[ -z "${LATEST_DIR:-}" ]]; then
            echo "No model run directories under ${BASE}/"
            echo "run_id=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          RUN_ID=$(basename "${LATEST_DIR%/}")
          echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"
          echo "Latest run: ${RUN_ID}"

          mkdir -p results/predictions results/metrics results/permutation_importance results/pdp results/history

          gsutil cp "${LATEST_DIR}predictions.csv" "results/predictions/${RUN_ID}-predictions.csv" 2>/dev/null || true
          gsutil cp "${LATEST_DIR}metrics.json" "results/metrics/${RUN_ID}-metrics.json" 2>/dev/null || true
          gsutil cp "${LATEST_DIR}metrics.csv" "results/metrics/${RUN_ID}-metrics.csv" 2>/dev/null || true
          gsutil cp "${LATEST_DIR}permutation_importance.csv" "results/permutation_importance/${RUN_ID}-permutation_importance.csv" 2>/dev/null || true
          gsutil cp "${LATEST_DIR}model_info.json" "results/metrics/${RUN_ID}-model_info.json" 2>/dev/null || true
          gsutil cp "${LATEST_DIR}model_benchmark.csv" "results/metrics/${RUN_ID}-model_benchmark.csv" 2>/dev/null || true
          gsutil cp "${LATEST_DIR}tuning_trials.csv" "results/metrics/${RUN_ID}-tuning_trials.csv" 2>/dev/null || true

          while IFS= read -r blob; do
            [[ -z "$blob" ]] && continue
            [[ "$blob" == *.png ]] || continue
            bn=$(basename "$blob")
            gsutil cp "$blob" "results/pdp/${RUN_ID}_${bn}" 2>/dev/null || true
          done < <(gsutil ls "${LATEST_DIR}pdp/" 2>/dev/null || true)

          gsutil cp "gs://${BUCKET_NAME}/${GCS_METRICS_HISTORY}" "results/history/metrics_history.csv" 2>/dev/null || true

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          # Track subfolders + results/README.md (ignore anything else under results/)
          git add results/README.md results/predictions results/metrics results/permutation_importance results/pdp results/history 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No new artifacts to commit."
            exit 0
          fi

          RUN_ID="${{ steps.sync.outputs.run_id }}"
          git commit -m "ci: sync model artifacts (run ${RUN_ID})"
          git pull --rebase origin main
          git push
